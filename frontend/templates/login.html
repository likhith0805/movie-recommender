{% extends "base.html" %}

{% block title %}Login / Signup{% endblock %}

{% block content %}
  <div class="row justify-content-center">
    <div class="col-12 col-md-6 col-lg-5">
      <div class="card app-card">
        <div class="card-body">
          <h2 class="h4 mb-3">Login / Signup</h2>

          <div id="authAlert" class="alert alert-danger d-none" role="alert"></div>

          <div class="mb-4">
            <h3 class="h5">Login</h3>
            <form id="loginForm">
              <label class="form-label">Username</label>
              <input class="form-control" name="username" required minlength="3" />
              <label class="form-label mt-2">Password</label>
              <input class="form-control" name="password" type="password" required minlength="4" />
              <button class="btn btn-primary w-100 mt-3" type="submit">Login</button>
            </form>
          </div>

          <div class="border-top pt-4">
            <h3 class="h5">Signup</h3>
            <form id="signupForm">
              <label class="form-label">Username</label>
              <input class="form-control" name="username" required minlength="3" />
              <label class="form-label mt-2">Password</label>
              <input class="form-control" name="password" type="password" required minlength="4" />
              <button class="btn btn-outline-primary w-100 mt-3" type="submit">Create account</button>
            </form>
          </div>

          <div class="small text-white-50 mt-3">
            Tip: use username/password you create here. MovieLens demo users exist too after dataset load.
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    window.APP_PAGE = "login";
  </script>
{% endblock %}
